<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Agent</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="app">

        <header class="header">

            <img src="images/robot.svg" alt="Agent" class="avatar">

            <h1>Chatbot Agent</h1>

            <p>Tu asistente inteligente</p>

        </header>

        <main id="chat" class="chat">

            <div class="message agent">

                <img src="images/robot.svg" class="bubble-avatar">

                <div class="bubble">

                    ¡Hola! Soy tu agente. ¿En qué puedo ayudarte?

                </div>

            </div>

        </main>

        <footer class="input-area">

            <button id="image-btn" class="icon-button" title="Adjuntar imagen">

                <img src="images/image.svg" alt="Imagen">

            </button>

            <input
                id="message-input"
                type="text"
                placeholder="Escribe un mensaje..."
                autocomplete="off">

            <button id="send-btn" class="send-button">

                <img src="images/send.svg" alt="Enviar">

            </button>

        </footer>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
