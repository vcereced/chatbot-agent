version: "3.9"

services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "8080:80"
    depends_on:
      - agent

  agent:
    build:
      context: ./agent
    expose:
      - "8000"
    volumes:
      - ./agent:/app
      - ./shared:/shared
    environment:
      PYTHONPATH: /shared
      LLM_URL: http://llm:8000
      TOOLS_URL: http://tools-executor:8000
      MEMORY_URL: http://memory:8000
    

  llm:
    build:
      context: ./llm
    expose:
      - "8000"
    volumes:
      - ./llm:/app
      - ./shared:/shared
    environment:
      PYTHONPATH: /shared
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3:8b
      

  tools-executor:
    build:
      context: ./tools-executor
    expose:
      - "8000"
    volumes:
      - ./tools-executor:/app
      - ./shared:/shared
    environment:
      PYTHONPATH: /shared

  memory:
    build:
      context: ./memory
    expose:
      - "8000"
    environment:
      PYTHONPATH: /shared
    volumes:
      - ./memory:/app
      - ./shared:/shared  

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped

    ports:
      - "11434"

    volumes:
      - ollama:/root/.ollama